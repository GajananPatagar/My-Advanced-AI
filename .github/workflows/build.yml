name: Build Windows App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Brain File
      run: curl.exe -L -o tinyllama-1.1b-chat-v1.0.q4_k_m.gguf https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

    - name: Build All-In-One App
      run: pyinstaller --onefile --collect-all llama_cpp --add-data "tinyllama-1.1b-chat-v1.0.q4_k_m.gguf;." main.py

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: Advanced-AI-App
        path: dist/main.exe
